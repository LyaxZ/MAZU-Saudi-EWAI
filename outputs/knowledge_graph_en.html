<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#f0f4f8;overflow:hidden}
.top{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:10;position:relative}
.header{text-align:center;padding:16px 20px 8px}
.header h1{font-size:20px;color:#1e293b;font-weight:700}
.header p{font-size:12px;color:#64748b;margin:4px 0 0}
.btn-row{display:flex;justify-content:center;gap:6px;padding:8px 12px 12px;flex-wrap:wrap}
.fbtn{padding:6px 16px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:#475569}
.fbtn:hover{border-color:#94a3b8}
.fbtn.on{border-color:#4f46e5;background:#eef2ff;color:#4f46e5}
#network{height:calc(100vh - 108px)}
.legend{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:14px;font-size:11px;color:#64748b;background:#fff;
  padding:6px 16px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:5}
.legend i{display:inline-block;width:10px;height:10px;vertical-align:middle;margin-right:3px}
.legend .d1{background:#fca5a5;border-radius:2px}
.legend .d2{background:#bbf7d0;border-radius:50%}
.legend .d3{background:#ef4444;border-radius:50%}
.legend .l1{color:#e2e8f0} .legend .l2{color:#cbd5e1}
</style>
</head>
<body>
<div class="top">
<div class="header">
<h1>🛰️ MAZU Saudi Early Warning — Hazard Factors · Mechanisms · Disaster Types</h1>
<p>Factors → Mechanisms → Disasters | Click disaster to filter · Double-click to reset</p>
</div>
<div class="btn-row" id="btnRow">
<button class="fbtn on" onclick="resetFilter()">🌐 All</button>
<button class="fbtn" data-d="⚡Flash Flood" onclick="pick('⚡Flash Flood')">⚡Flash Flood</button>
<button class="fbtn" data-d="🔥Extreme Heat" onclick="pick('🔥Extreme Heat')">🔥Extreme Heat</button>
<button class="fbtn" data-d="🌪️Dust Storm" onclick="pick('🌪️Dust Storm')">🌪️Dust Storm</button>
<button class="fbtn" data-d="🌊Coastal Wave" onclick="pick('🌊Coastal Wave')">🌊Coastal Wave</button>
</div>
</div>
<div id="network"></div>
<div class="legend">
<span><i class="d1"></i>Hazard Factors (Box)</span>
<span><i class="d2"></i>Mechanisms (Ellipse)</span>
<span><i class="d3"></i>Disaster Types (Circle)</span>
<span class="l2">── Causal Link</span>
</div>

<script>
var allNodes = [{"id": 0, "label": "CAPE\n(Convective Potential)", "title": "Core driver of strong convection; higher = more thunderstorms", "color": {"background": "#fca5a5", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 1, "label": "Near-Surface\nRel. Humidity", "title": "Low-level moisture; directly affects precipitation efficiency", "color": {"background": "#93c5fd", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 2, "label": "Daily Total\nPrecipitation", "title": "24h accumulated precip; direct flash flood trigger", "color": {"background": "#60a5fa", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 3, "label": "10m Wind\nSpeed", "title": "Near-surface wind; driver of dust & waves", "color": {"background": "#a5b4fc", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 4, "label": "Temperature\nAnomaly", "title": "Departure from climatology; core heatwave indicator", "color": {"background": "#fdba74", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 5, "label": "Moisture Flux\nDivergence", "title": "Moisture convergence/divergence; determines rain zones", "color": {"background": "#86efac", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 6, "label": "Orography\n(Elevation)", "title": "Orographic uplift; windward slopes enhance rain", "color": {"background": "#d4d4d8", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 7, "label": "VPD\n(Vapor Pressure Deficit)", "title": "Atmospheric dryness; higher VPD = drier air", "color": {"background": "#fde68a", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 8, "label": "850hPa\nVorticity", "title": "Low-level cyclonic rotation; dust storm dynamics", "color": {"background": "#c4b5fd", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 9, "label": "Deep Layer\nWind Shear", "title": "850-300hPa wind difference; convective organization", "color": {"background": "#fecaca", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 10, "label": "CIN\n(Convective Inhibition)", "title": "Energy inhibiting convection; lower CIN = easier trigger", "color": {"background": "#e2e8f0", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 11, "label": "Surface\nTemperature", "title": "Surface thermal state; affects near-surface stability", "color": {"background": "#fed7aa", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 12, "label": "Strong Convection", "title": "High CAPE + Low CIN → Deep convection → Heavy rain", "color": {"background": "#fecaca", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 13, "label": "Moisture Convergence", "title": "Moisture flux + High humidity → Heavy precipitation", "color": {"background": "#bbf7d0", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 14, "label": "Atmospheric Drying", "title": "High VPD + Low humidity + Heat → Drought / Dust", "color": {"background": "#fde68a", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 15, "label": "Strong Wind Dynamics", "title": "Strong wind + Vorticity → Dust lofting / Waves", "color": {"background": "#c7d2fe", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 16, "label": "Thermal Anomaly", "title": "Large T anomaly + Hot surface → Heatwave", "color": {"background": "#fed7aa", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 17, "label": "Orographic Forcing", "title": "Uplift + Moisture → Windward heavy rain", "color": {"background": "#d4d4d8", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 18, "label": "⚡Flash Flood", "title": "Heavy rain + Convective instability + Orographic uplift → Flash flood", "color": {"background": "#ef4444", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 19, "label": "🔥Extreme Heat", "title": "Temperature anomaly → Persistent heatwave", "color": {"background": "#f97316", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 20, "label": "🌪️Dust Storm", "title": "Strong wind + Dry surface + Low humidity → Dust storm", "color": {"background": "#eab308", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 21, "label": "🌊Coastal Wave", "title": "Strong wind + Low terrain + Moisture → Storm surge", "color": {"background": "#3b82f6", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}];
var allEdges = [{"id": 0, "from": 0, "to": 12, "label": "Provides energy", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 1, "from": 10, "to": 12, "label": "Weakens inhibition", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 2, "from": 9, "to": 12, "label": "Organizes & sustains", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 3, "from": 2, "to": 13, "label": "Precipitation status", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 4, "from": 5, "to": 13, "label": "Moisture convergence", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 5, "from": 1, "to": 13, "label": "Humidity condition", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 6, "from": 7, "to": 14, "label": "Dryness level", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 7, "from": 4, "to": 14, "label": "Intensifies heat", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 8, "from": 11, "to": 14, "label": "Surface heating", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 9, "from": 1, "to": 14, "label": "Reduces humidity", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 10, "from": 3, "to": 15, "label": "Direct driver", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 11, "from": 8, "to": 15, "label": "Enhances rotation", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 12, "from": 4, "to": 16, "label": "Deviation degree", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 13, "from": 11, "to": 16, "label": "Surface heating", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 14, "from": 6, "to": 17, "label": "Uplift effect", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 15, "from": 5, "to": 17, "label": "Windward moisture", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 16, "from": 12, "to": 18, "label": "Primary cause", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 17, "from": 13, "to": 18, "label": "Direct trigger", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 18, "from": 17, "to": 18, "label": "Mountain enhancement", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 19, "from": 16, "to": 19, "label": "Direct cause", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 20, "from": 14, "to": 19, "label": "Intensifying effect", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 21, "from": 14, "to": 20, "label": "Dust lofting condition", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 22, "from": 15, "to": 20, "label": "Dynamic driver", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 23, "from": 16, "to": 20, "label": "Thermal turbulence", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 24, "from": 15, "to": 21, "label": "Wave driver", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 25, "from": 13, "to": 21, "label": "Moisture transport", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 26, "from": 17, "to": 21, "label": "Coastal effect", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}];
var nodes, edges;
var upstream = {};
allEdges.forEach(function(e) {
  if (!upstream[e.to]) upstream[e.to] = [];
  upstream[e.to].push(e.from);
});
var container = document.getElementById("network");
var network = new vis.Network(container,
  {nodes: new vis.DataSet(allNodes), edges: new vis.DataSet(allEdges)},
  { physics: { solver:"forceAtlas2Based", forceAtlas2Based:{gravitationalConstant:-40,centralGravity:.005,springLength:160} },
     interaction: { hover:true, tooltipDelay:200 },
     edges: { smooth:{type:"curvedCW",roundness:.15} } });
nodes = network.body.data.nodes; edges = network.body.data.edges;
var cur = null;
function pick(label) {
  var root = null;
  allNodes.forEach(function(n) { if (n.label === label) root = n.id; });
  if (root === null) return;
  var vis = new Set([root]), queue = [root];
  while (queue.length) {
    var v = queue.shift();
    (upstream[v] || []).forEach(function(nb) { if (!vis.has(nb)) { vis.add(nb); queue.push(nb); } });
  }
  nodes.update(nodes.get().map(function(n) { return {id:n.id,hidden:!vis.has(n.id)}; }));
  edges.update(edges.get().map(function(e) { return {id:e.id,hidden:!vis.has(e.from)||!vis.has(e.to)}; }));
  document.querySelectorAll(".fbtn").forEach(function(b) { b.classList.remove("on"); });
  var btn = document.querySelector('.fbtn[data-d="' + label.replace(/"/g,'&quot;') + '"]');
  if (btn) btn.classList.add("on");
  cur = label;
}
function resetFilter() {
  nodes.update(nodes.get().map(function(n) { return {id:n.id,hidden:false}; }));
  edges.update(edges.get().map(function(e) { return {id:e.id,hidden:false}; }));
  document.querySelectorAll(".fbtn").forEach(function(b) { b.classList.remove("on"); });
  document.querySelector(".fbtn").classList.add("on");
  cur = null;
}
network.on("click", function(p) {
  if (p.nodes.length === 1) {
    var n = nodes.get(p.nodes[0]);
    if (n.group === "disaster") { pick(n.label); return; }
  }
  if (p.nodes.length === 0 && cur) resetFilter();
});
network.on("doubleClick", function(p) { if (p.nodes.length === 0) resetFilter(); });
</script>
</body>
</html>
