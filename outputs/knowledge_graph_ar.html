<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="utf-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#f0f4f8;overflow:hidden}
.top{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:10;position:relative}
.header{text-align:center;padding:16px 20px 8px}
.header h1{font-size:20px;color:#1e293b;font-weight:700}
.header p{font-size:12px;color:#64748b;margin:4px 0 0}
.btn-row{display:flex;justify-content:center;gap:6px;padding:8px 12px 12px;flex-wrap:wrap}
.fbtn{padding:6px 16px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:#475569}
.fbtn:hover{border-color:#94a3b8}
.fbtn.on{border-color:#4f46e5;background:#eef2ff;color:#4f46e5}
#network{height:calc(100vh - 108px)}
.legend{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:14px;font-size:11px;color:#64748b;background:#fff;
  padding:6px 16px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:5}
.legend i{display:inline-block;width:10px;height:10px;vertical-align:middle;margin-right:3px}
.legend .d1{background:#fca5a5;border-radius:2px}
.legend .d2{background:#bbf7d0;border-radius:50%}
.legend .d3{background:#ef4444;border-radius:50%}
.legend .l1{color:#e2e8f0} .legend .l2{color:#cbd5e1}
</style>
</head>
<body>
<div class="top">
<div class="header">
<h1>🛰️ MAZU للإنذار المبكر — عوامل الخطر · آليات التكون · أنواع الكوارث</h1>
<p>عوامل الخطر → آليات التكون → أنواع الكوارث | انقر على الكارثة للتصفية · انقر مرتين للإعادة</p>
</div>
<div class="btn-row" id="btnRow">
<button class="fbtn on" onclick="resetFilter()">الكل 🌐</button>
<button class="fbtn" data-d="فيضانات مفاجئة⚡" onclick="pick('فيضانات مفاجئة⚡')">فيضانات مفاجئة⚡</button>
<button class="fbtn" data-d="حرارة شديدة🔥" onclick="pick('حرارة شديدة🔥')">حرارة شديدة🔥</button>
<button class="fbtn" data-d="عاصفة ترابية🌪️" onclick="pick('عاصفة ترابية🌪️')">عاصفة ترابية🌪️</button>
<button class="fbtn" data-d="أمواج ساحلية🌊" onclick="pick('أمواج ساحلية🌊')">أمواج ساحلية🌊</button>
</div>
</div>
<div id="network"></div>
<div class="legend">
<span><i class="d1"></i>عوامل الخطر (مربع)</span>
<span><i class="d2"></i>آليات التكون (بيضاوي)</span>
<span><i class="d3"></i>أنواع الكوارث (دائرة)</span>
<span class="l2">── علاقة سببية</span>
</div>

<script>
var allNodes = [{"id": 0, "label": "CAPE\n(طاقة الحمل)", "title": "المحرك الأساسي للحمل القوي", "color": {"background": "#fca5a5", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 1, "label": "الرطوبة النسبية\nبالقرب من السطح", "title": "رطوبة الطبقة السفلى", "color": {"background": "#93c5fd", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 2, "label": "إجمالي الهطول\nاليومي", "title": "هطول 24 ساعة متراكم", "color": {"background": "#60a5fa", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 3, "label": "سرعة الرياح\n10م", "title": "رياح قرب السطح", "color": {"background": "#a5b4fc", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 4, "label": "شذوذ درجة\nالحرارة", "title": "انحراف عن المناخ", "color": {"background": "#fdba74", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 5, "label": "تباعد تدفق\nالرطوبة", "title": "تقارب/تباعد الرطوبة", "color": {"background": "#86efac", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 6, "label": "الارتفاع\nالطبوغرافي", "title": "رفع طبوغرافي", "color": {"background": "#d4d4d8", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 7, "label": "VPD\n(فرق ضغط البخار)", "title": "مؤشر جفاف الجو", "color": {"background": "#fde68a", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 8, "label": "دوامية\n850hPa", "title": "دوران إعصاري منخفض", "color": {"background": "#c4b5fd", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 9, "label": "قص الرياح\nالعميق", "title": "فرق رياح 850-300hPa", "color": {"background": "#fecaca", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 10, "label": "CIN\n(تثبيط الحمل)", "title": "طاقة تثبيط الحمل", "color": {"background": "#e2e8f0", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 11, "label": "درجة حرارة\nالسطح", "title": "حالة حرارية للسطح", "color": {"background": "#fed7aa", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 12, "label": "تطور الحمل القوي", "title": "حمل عميق → أمطار غزيرة", "color": {"background": "#fecaca", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 13, "label": "تقارب الرطوبة", "title": "رطوبة عالية → هطول غزير", "color": {"background": "#bbf7d0", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 14, "label": "جفاف الغلاف الجوي", "title": "جفاف/غبار", "color": {"background": "#fde68a", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 15, "label": "ديناميكيات الرياح", "title": "تطاير غبار/أمواج", "color": {"background": "#c7d2fe", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 16, "label": "شذوذ حراري", "title": "موجة حر", "color": {"background": "#fed7aa", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 17, "label": "إجبار طبوغرافي", "title": "هطول على المنحدرات", "color": {"background": "#d4d4d8", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 18, "label": "فيضانات مفاجئة⚡", "title": "فيضان مفاجئ", "color": {"background": "#ef4444", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 19, "label": "حرارة شديدة🔥", "title": "موجة حر مستمرة", "color": {"background": "#f97316", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 20, "label": "عاصفة ترابية🌪️", "title": "عاصفة ترابية", "color": {"background": "#eab308", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 21, "label": "أمواج ساحلية🌊", "title": "عرام عاصفي", "color": {"background": "#3b82f6", "border": "#ef4444"}, "shape": "dot", "size": 36, "font": {"size": 13, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}];
var allEdges = [{"id": 0, "from": 0, "to": 12, "label": "يوفر طاقة", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 1, "from": 10, "to": 12, "label": "يضعف التثبيط", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 2, "from": 9, "to": 12, "label": "ينظم ويحافظ", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 3, "from": 2, "to": 13, "label": "حالة الهطول", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 4, "from": 5, "to": 13, "label": "تقارب الرطوبة", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 5, "from": 1, "to": 13, "label": "حالة الرطوبة", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 6, "from": 7, "to": 14, "label": "مستوى الجفاف", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 7, "from": 4, "to": 14, "label": "يفاقم الحرارة", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 8, "from": 11, "to": 14, "label": "تسخين السطح", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 9, "from": 1, "to": 14, "label": "يقلل الرطوبة", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 10, "from": 3, "to": 15, "label": "محرك مباشر", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 11, "from": 8, "to": 15, "label": "يعزز الدوران", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 12, "from": 4, "to": 16, "label": "درجة الانحراف", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 13, "from": 11, "to": 16, "label": "تسخين السطح", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 14, "from": 6, "to": 17, "label": "تأثير الرفع", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 15, "from": 5, "to": 17, "label": "رطوبة مواجهة للرياح", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 16, "from": 12, "to": 18, "label": "سبب رئيسي", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 17, "from": 13, "to": 18, "label": "محفز مباشر", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 18, "from": 17, "to": 18, "label": "تعزيز جبلي", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 19, "from": 16, "to": 19, "label": "سبب مباشر", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 20, "from": 14, "to": 19, "label": "تأثير مضاعف", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 21, "from": 14, "to": 20, "label": "شرط تطاير الغبار", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 22, "from": 15, "to": 20, "label": "محرك ديناميكي", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 23, "from": 16, "to": 20, "label": "اضطراب حراري", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 24, "from": 15, "to": 21, "label": "محرك الأمواج", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 25, "from": 13, "to": 21, "label": "نقل الرطوبة", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 26, "from": 17, "to": 21, "label": "تأثير ساحلي", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}];
var nodes, edges;
var upstream = {};
allEdges.forEach(function(e) {
  if (!upstream[e.to]) upstream[e.to] = [];
  upstream[e.to].push(e.from);
});
var container = document.getElementById("network");
var network = new vis.Network(container,
  {nodes: new vis.DataSet(allNodes), edges: new vis.DataSet(allEdges)},
  { physics: { solver:"forceAtlas2Based", forceAtlas2Based:{gravitationalConstant:-40,centralGravity:.005,springLength:160} },
     interaction: { hover:true, tooltipDelay:200 },
     edges: { smooth:{type:"curvedCW",roundness:.15} } });
nodes = network.body.data.nodes; edges = network.body.data.edges;
var cur = null;
function pick(label) {
  var root = null;
  allNodes.forEach(function(n) { if (n.label === label) root = n.id; });
  if (root === null) return;
  var vis = new Set([root]), queue = [root];
  while (queue.length) {
    var v = queue.shift();
    (upstream[v] || []).forEach(function(nb) { if (!vis.has(nb)) { vis.add(nb); queue.push(nb); } });
  }
  nodes.update(nodes.get().map(function(n) { return {id:n.id,hidden:!vis.has(n.id)}; }));
  edges.update(edges.get().map(function(e) { return {id:e.id,hidden:!vis.has(e.from)||!vis.has(e.to)}; }));
  document.querySelectorAll(".fbtn").forEach(function(b) { b.classList.remove("on"); });
  var btn = document.querySelector('.fbtn[data-d="' + label.replace(/"/g,'&quot;') + '"]');
  if (btn) btn.classList.add("on");
  cur = label;
}
function resetFilter() {
  nodes.update(nodes.get().map(function(n) { return {id:n.id,hidden:false}; }));
  edges.update(edges.get().map(function(e) { return {id:e.id,hidden:false}; }));
  document.querySelectorAll(".fbtn").forEach(function(b) { b.classList.remove("on"); });
  document.querySelector(".fbtn").classList.add("on");
  cur = null;
}
network.on("click", function(p) {
  if (p.nodes.length === 1) {
    var n = nodes.get(p.nodes[0]);
    if (n.group === "disaster") { pick(n.label); return; }
  }
  if (p.nodes.length === 0 && cur) resetFilter();
});
network.on("doubleClick", function(p) { if (p.nodes.length === 0) resetFilter(); });
</script>
</body>
