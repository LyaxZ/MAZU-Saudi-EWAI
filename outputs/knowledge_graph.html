<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#f0f4f8;overflow:hidden}
.top{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:10;position:relative}
.header{text-align:center;padding:16px 20px 8px}
.header h1{font-size:20px;color:#1e293b;font-weight:700}
.header p{font-size:12px;color:#64748b;margin:4px 0 0}
.btn-row{display:flex;justify-content:center;gap:6px;padding:8px 12px 12px;flex-wrap:wrap}
.fbtn{padding:6px 16px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:#475569}
.fbtn:hover{border-color:#94a3b8}
.fbtn.on{border-color:#4f46e5;background:#eef2ff;color:#4f46e5}
#network{height:calc(100vh - 108px)}
.legend{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:14px;font-size:11px;color:#64748b;background:#fff;
  padding:6px 16px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:5}
.legend i{display:inline-block;width:10px;height:10px;vertical-align:middle;margin-right:3px}
.legend .d1{background:#fca5a5;border-radius:2px}
.legend .d2{background:#bbf7d0;border-radius:50%}
.legend .d3{background:#ef4444;border-radius:50%}
.legend .l1{color:#e2e8f0} .legend .l2{color:#cbd5e1}
</style>
</head>
<body>
<div class="top">
<div class="header">
<h1>🛰️ MAZU 沙特多灾种预警 — 致灾因子·形成机制·灾害类型 关系图谱</h1>
<p>致灾因子 → 形成机制 → 灾害类型 | 点击灾害节点筛选 · 双击空白重置</p>
</div>
<div class="btn-row" id="btnRow">
<button class="fbtn on" onclick="resetFilter()">🌐 全部</button>
<button class="fbtn" data-d="⚡ 暴雨山洪" onclick="pick('⚡ 暴雨山洪')">⚡ 暴雨山洪</button>
<button class="fbtn" data-d="🔥 极端高温" onclick="pick('🔥 极端高温')">🔥 极端高温</button>
<button class="fbtn" data-d="🌪️ 沙尘强风" onclick="pick('🌪️ 沙尘强风')">🌪️ 沙尘强风</button>
<button class="fbtn" data-d="🌊 沿海风浪" onclick="pick('🌊 沿海风浪')">🌊 沿海风浪</button>
</div>
</div>
<div id="network"></div>
<div class="legend">
<span><i class="d1"></i>致灾因子(方框)</span>
<span><i class="d2"></i>形成机制(椭圆)</span>
<span><i class="d3"></i>灾害类型(大圆)</span>
<span class="l2">━━ 因果关系</span>
</div>

<script>
var allNodes = [{"id": 0, "label": "对流有效位能\n(CAPE)", "title": "强对流核心驱动因子，数值越高越有利于雷暴发展", "color": {"background": "#fca5a5", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 1, "label": "近地面相对湿度", "title": "低层大气水汽含量，直接影响降水效率", "color": {"background": "#93c5fd", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 2, "label": "日降水总量", "title": "24小时累积降水量，山洪直接触发条件", "color": {"background": "#60a5fa", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 3, "label": "10米风速", "title": "近地面风速，沙尘起沙和风浪的直接动力", "color": {"background": "#a5b4fc", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 4, "label": "气温距平", "title": "当日气温偏离气候态的程度，热浪核心指标", "color": {"background": "#fdba74", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 5, "label": "水汽通量散度", "title": "水汽输送的汇聚/辐散程度，决定降水落区", "color": {"background": "#86efac", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 6, "label": "地形高度", "title": "地形抬升强迫，迎风坡增强降水", "color": {"background": "#d4d4d8", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 7, "label": "饱和水汽压差\n(VPD)", "title": "大气干燥程度指标，VPD越高空气越干", "color": {"background": "#fde68a", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 8, "label": "850hPa 涡度", "title": "低层气旋式旋转，沙尘天气的动力条件", "color": {"background": "#c4b5fd", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 9, "label": "深层风切变", "title": "850-300hPa风速差异，对流组织化条件", "color": {"background": "#fecaca", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 10, "label": "对流抑制能量\n(CIN)", "title": "抑制对流的能量，CIN越小越容易触发", "color": {"background": "#e2e8f0", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 11, "label": "地表温度", "title": "地表热力状况，影响近地面稳定度", "color": {"background": "#fed7aa", "border": "#94a3b8"}, "shape": "box", "size": 28, "font": {"size": 11, "face": "Segoe UI"}, "group": "factor"}, {"id": 12, "label": "强对流发展", "title": "CAPE高 + CIN低 → 深厚对流 → 暴雨", "color": {"background": "#fecaca", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 13, "label": "水汽辐合", "title": "水汽输送汇聚 + 湿度高 → 强降水", "color": {"background": "#bbf7d0", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 14, "label": "大气干燥化", "title": "VPD高 + 湿度低 + 高温 → 极端干旱/沙尘", "color": {"background": "#fde68a", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 15, "label": "强风动力", "title": "风速大 + 涡度强 → 起沙 / 波浪", "color": {"background": "#c7d2fe", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 16, "label": "热力异常", "title": "气温距平大 + 地表高温 → 高温热浪", "color": {"background": "#fed7aa", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 17, "label": "地形强迫", "title": "地形抬升 + 水汽 → 迎风坡强降水", "color": {"background": "#d4d4d8", "border": "#94a3b8"}, "shape": "ellipse", "size": 20, "font": {"size": 11, "face": "Segoe UI", "color": "#475569"}, "group": "mechanism"}, {"id": 18, "label": "⚡ 暴雨山洪", "title": "强降水 + 对流不稳定 + 地形抬升 → 突发性洪水", "color": {"background": "#ef4444", "border": "#fff"}, "shape": "dot", "size": 52, "borderWidth": 4, "font": {"size": 15, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 19, "label": "🔥 极端高温", "title": "气温异常偏离气候态 → 持续高温热浪", "color": {"background": "#f97316", "border": "#fff"}, "shape": "dot", "size": 52, "borderWidth": 4, "font": {"size": 15, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 20, "label": "🌪️ 沙尘强风", "title": "强风 + 干燥地表 + 低湿度 → 沙尘暴", "color": {"background": "#eab308", "border": "#fff"}, "shape": "dot", "size": 52, "borderWidth": 4, "font": {"size": 15, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}, {"id": 21, "label": "🌊 沿海风浪", "title": "强风 + 低地形 + 水汽 → 风暴潮/大浪", "color": {"background": "#3b82f6", "border": "#fff"}, "shape": "dot", "size": 52, "borderWidth": 4, "font": {"size": 15, "face": "Segoe UI", "color": "#1e293b", "bold": true}, "group": "disaster"}];
var allEdges = [{"id": 0, "from": 0, "to": 12, "label": "提供能量", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 1, "from": 10, "to": 12, "label": "抑制减弱", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 2, "from": 9, "to": 12, "label": "组织维持", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 3, "from": 5, "to": 13, "label": "水汽汇聚", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 4, "from": 1, "to": 13, "label": "湿度条件", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 5, "from": 7, "to": 14, "label": "干燥程度", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 6, "from": 4, "to": 14, "label": "高温加剧", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 7, "from": 11, "to": 14, "label": "地表加热", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 8, "from": 1, "to": 14, "label": "湿度降低", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 9, "from": 3, "to": 15, "label": "直接动力", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 10, "from": 8, "to": 15, "label": "旋转增强", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 11, "from": 4, "to": 16, "label": "偏离程度", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 12, "from": 11, "to": 16, "label": "地表加热", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 13, "from": 6, "to": 17, "label": "抬升作用", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 14, "from": 5, "to": 17, "label": "迎风水汽", "color": {"color": "#e2e8f0", "highlight": "#cbd5e1"}, "width": 1.5, "arrows": "to", "font": {"size": 8, "face": "Segoe UI", "color": "#94a3b8", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 15, "from": 12, "to": 18, "label": "主要成因", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 16, "from": 13, "to": 18, "label": "直接触发", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 17, "from": 17, "to": 18, "label": "山地增强", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 18, "from": 16, "to": 19, "label": "直接成因", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 19, "from": 14, "to": 19, "label": "加剧作用", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 20, "from": 14, "to": 20, "label": "起沙条件", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 21, "from": 15, "to": 20, "label": "动力驱动", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 22, "from": 15, "to": 21, "label": "波浪驱动", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 23, "from": 13, "to": 21, "label": "水汽输送", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}, {"id": 24, "from": 17, "to": 21, "label": "海岸效应", "color": {"color": "#cbd5e1", "highlight": "#94a3b8"}, "width": 2, "arrows": "to", "font": {"size": 9, "face": "Segoe UI", "color": "#64748b", "strokeWidth": 2, "strokeColor": "#fff", "align": "horizontal"}}];
var nodes = new vis.DataSet(allNodes);
var edges = new vis.DataSet(allEdges);

var network = new vis.Network(document.getElementById("network"), {nodes:nodes,edges:edges}, {
  physics: {
    solver: "forceAtlas2Based",
    forceAtlas2Based: { gravitationalConstant: -55, centralGravity: 0.004, springLength: 170, springConstant: 0.025, damping: 0.4 },
    stabilization: { iterations: 200, fit: true }
  },
  interaction: { hover: true, tooltipDelay: 150, navigationButtons: true, keyboard: true, dragNodes: true },
  edges: { smooth: { type: "continuous", roundness: 0.3 }, font: { align: "horizontal" } }
});

// 有向上游邻接（从 to → from：灾害→机制→因子）
var upstream = {};
allEdges.forEach(function(e) {
  if (!upstream[e.to]) upstream[e.to] = [];
  upstream[e.to].push(e.from);
});

var cur = null;

function pick(label) {
  var root = null;
  allNodes.forEach(function(n) { if (n.label === label) root = n.id; });
  if (root === null) return;

  // 有向 BFS 从灾害向上游走（灾害→机制→因子），不走向下游的其他灾害
  var vis = new Set([root]);
  var queue = [root];
  while (queue.length) {
    var v = queue.shift();
    (upstream[v] || []).forEach(function(nb) {
      if (!vis.has(nb)) { vis.add(nb); queue.push(nb); }
    });
  }

  var nu = []; nodes.get().forEach(function(n) { nu.push({id:n.id,hidden:!vis.has(n.id)}); });
  nodes.update(nu);
  var eu = []; edges.get().forEach(function(e) { eu.push({id:e.id,hidden:!vis.has(e.from)||!vis.has(e.to)}); });
  edges.update(eu);

  document.querySelectorAll(".fbtn").forEach(function(b) { b.classList.remove("on"); });
  var btn = document.querySelector('.fbtn[data-d="'+label+'"]'); if (btn) btn.classList.add("on");
  cur = label;
}

function resetFilter() {
  nodes.update(nodes.get().map(function(n) { return {id:n.id,hidden:false}; }));
  edges.update(edges.get().map(function(e) { return {id:e.id,hidden:false}; }));
  document.querySelectorAll(".fbtn").forEach(function(b) { b.classList.remove("on"); });
  document.querySelector(".fbtn").classList.add("on");
  cur = null;
}

network.on("click", function(p) {
  if (p.nodes.length === 1) {
    var n = nodes.get(p.nodes[0]);
    if (n.group === "disaster") { pick(n.label); return; }
  }
  if (p.nodes.length === 0 && cur) resetFilter();
});

network.on("doubleClick", function(p) { if (p.nodes.length === 0) resetFilter(); });
</script>
</body>
</html>
