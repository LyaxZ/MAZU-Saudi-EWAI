# Nginx 反向代理配置（参考用）
# 适用于在 Gradio 前端加一层 Nginx 做 SSL 终止、负载均衡、访问控制
#
# 使用方式：
#   1. 将本文件复制到 /etc/nginx/sites-available/mazu
#   2. 修改 server_name 为你的域名
#   3. 配置 SSL 证书（推荐 Let's Encrypt）
#   4. sudo ln -s /etc/nginx/sites-available/mazu /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx

upstream mazu_backend {
    server 127.0.0.1:7866;
    # 如果有多个 Gradio 实例可添加更多 server 行
}

# HTTP → HTTPS 重定向（可选）
server {
    listen 80;
    server_name mazu.example.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name mazu.example.com;

    # SSL 证书（替换为实际路径）
    ssl_certificate     /etc/letsencrypt/live/mazu.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mazu.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 客户端上传限制
    client_max_body_size 100m;

    location / {
        proxy_pass http://mazu_backend;

        # WebSocket 支持（Gradio 必需）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（LLM 流式响应可能较慢）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # 禁用缓冲以支持流式响应
        proxy_buffering off;
    }

    # 静态文件缓存（Gradio 内部资源）
    location /static/ {
        proxy_pass http://mazu_backend;
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 日志
    access_log /var/log/nginx/mazu_access.log;
    error_log  /var/log/nginx/mazu_error.log;
}
